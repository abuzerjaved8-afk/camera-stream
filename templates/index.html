<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Camera Live Stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0f;
            color: #f0f0f0;
            font-family: -apple-system, Segoe UI, Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #9aa0a6;
            margin-bottom: 16px;
        }
        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #ff4d4f;
            animation: pulse 1.4s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .frame {
            width: 100%;
            max-width: 760px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            background: #000;
            line-height: 0;
        }
        .frame img {
            width: 100%;
            height: auto;
            display: block;
        }
        footer {
            margin-top: 14px;
            font-size: 0.75rem;
            color: #6b7075;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Laptop Camera</h1>
    <div class="status">
        <span class="dot"></span> LIVE
    </div>

    <div class="frame">
        <img src="/video" alt="Camera stream loading...">
    </div>

    <footer>
        Streaming over your local hotspot &middot; video only, no audio
    </footer>
</body>
</html>
